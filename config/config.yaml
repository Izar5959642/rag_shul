# exp_config.yaml — RAG pipeline configuration (experiments)
# ===========================================================
# Experiment settings. Paths are relative to the experiments/ directory.
#
# Pipeline flow (exp_main.py):
#   1. chunker.build_chunks_json: json_file    →  chunks_json
#   2. embed.build_embeddings:    chunks_json  →  embeddings_npy
#   3. retriever (retrieval_npy): chunks_json + embeddings_npy + query → results
#   4. evaluator:                 retriever   + csv_path → report
#
# Skip logic (handled in exp_main):
#   • embeddings_npy exists       → skip stages 1 and 2
#   • chunks_json exists, no npy  → skip stage 1 only
#   • neither exists              → full run
#   • --force-rebuild             → delete everything and rerun

# Run mode: full = real data | mini = small smoke-test data
# Can also be overridden on the command line: --mode full / --mode mini
#run_mode: &run_mode quick        # quick | full | mini
rebuild: &rebuild false
log_level: INFO   # DEBUG / INFO / WARNING / ERROR / CRITICAL

paths:
  # --- stage 0: data generation ---
  source_txt:      "data/source_original/data_fixed.txt"                # raw Torat Emet text (input)
  headings_txt:    "data/source_original/Shulchan_Aruch_Text_Headlines.txt" # table of contents (input)
  summaries_cache: "data/seif_modern_summary_cache.json"                # pre-generated GPT summaries (input)
  questions_cache: "data/seif_questions_gpt_cache.json"                 # pre-generated GPT questions (input)
  data_file_without_additional_breadcrumb: "data/processed/shulchan_aruch_rag.json"  # build_rag output
  data_file_with_breadcrumb: data/processed/shulchan_aruch_rag_with_breadcrumb.json  # final stage-0 artifact (enrich → breadcrumb)
  # --- stage 1: chunking ---
  chunks_json: &chunk_file "data/chunks.json"
  embeddings_file:  &embeddings_file "data/embeddings.npy"
  # --- stage 2: embedding ---
  chroma_dir: "embedder/chroma_db_ver_2"   # overridable via env CHROMA_DIR
  # --- stage 3: evaluation ---
  csv_path: "data/eval/sa_eval.csv"        # benchmark questions (real CSV)
  eval_results_dir: "data/eval/results"    # where eval reports are saved
 
chunker:
  #run_mode: *run_mode
  rebuild: *rebuild
  chunk_size: 200       # words per chunk
  chunk_file: *chunk_file
  output_type: "json"
  overlap: 50           # words shared between consecutive chunks
  mode: seif            # "seif" | "siman" | "sliding_window"
  chunk_fields:         # ordered list of seif fields to join into the chunk text
    - text
    - hagah             # uncomment to include Rema commentary
    # - siman_title       # uncomment to prepend the siman topic heading to each chunk
  siman_fields:         # ordered list of siman-level fields to prepend to each chunk
    - hilchot_group
    # - siman_sign

  text_variants: # list of named text-build configs; each produces one table in the output
    # --- full context ---
    - type_text: hilchot_group+siman_sign+text+hagah
      chunk_fields: [text, hagah]
      siman_fields: [hilchot_group, siman_sign]

    - type_text: hilchot_group+text+hagah
      chunk_fields: [text, hagah]
      siman_fields: [hilchot_group]

    - type_text: siman_sign+text+hagah
      chunk_fields: [text, hagah]
      siman_fields: [siman_sign]

    - type_text: text+hagah
      chunk_fields: [text, hagah]
      siman_fields: []

    # --- text only (no hagah) ---
    - type_text: hilchot_group+siman_sign+text
      chunk_fields: [text]
      siman_fields: [hilchot_group, siman_sign]

    - type_text: hilchot_group+text
      chunk_fields: [text]
      siman_fields: [hilchot_group]

    - type_text: siman_sign+text
      chunk_fields: [text]
      siman_fields: [siman_sign]

    - type_text: text_only
      chunk_fields: [text]
      siman_fields: []

    # --- hagah (Rema) only ---
    - type_text: hilchot_group+siman_sign+hagah
      chunk_fields: [hagah]
      siman_fields: [hilchot_group, siman_sign]

    - type_text: hilchot_group+hagah
      chunk_fields: [hagah]
      siman_fields: [hilchot_group]

    - type_text: hagah_only
      chunk_fields: [hagah]
      siman_fields: []

    - type_text: siman_sign+hagah
      chunk_fields: [hagah]
      siman_fields: [siman_sign]

    # --- text + hilchot_group (single-field combo) ---
    - type_text: text+hilchot_group
      chunk_fields: [text]
      siman_fields: [hilchot_group]

    # --- modern_summary only ---
    - type_text: modern_summary
      chunk_fields: [modern_summary]
      siman_fields: []

    # --- modern_summary with breadcrumb ---
    - type_text: hilchot_group+siman_sign+modern_summary
      chunk_fields: [modern_summary]
      siman_fields: [hilchot_group, siman_sign]

    - type_text: hilchot_group+modern_summary
      chunk_fields: [modern_summary]
      siman_fields: [hilchot_group]

    - type_text: siman_sign+modern_summary
      chunk_fields: [modern_summary]
      siman_fields: [siman_sign]

    # --- modern_summary combined with text / hagah ---
    - type_text: text+modern_summary
      chunk_fields: [text, modern_summary]
      siman_fields: []

    - type_text: text+hagah+modern_summary
      chunk_fields: [text, hagah, modern_summary]
      siman_fields: []

    - type_text: hilchot_group+siman_sign+text+hagah+modern_summary
      chunk_fields: [text, hagah, modern_summary]
      siman_fields: [hilchot_group, siman_sign]

embeddings:
  #run_mode: *run_mode
  rebuild: *rebuild 
  chunk_file: *chunk_file
  embeddings_file: *embeddings_file
  model: "intfloat/multilingual-e5-large"
  batch_size: 32
  prefix_passage: "passage: "   # prepended to breadcrumb+text during build_embeddings
  prefix_query:   "query: "     # prepended to the query during retriever.retrieve
  enrich_fields:  []                # default — backwards compatible
  enrich_separator: " | "


retrieval:
  #run_mode: *run_mode
  rebuild: *rebuild
  chunk_file: *chunk_file
  embeddings_file: *embeddings_file
  prompt: ""
  top_k:          3     # chunks returned to the user / LLM
  top_k_retrieve: 10    # chunks retrieved for Recall@K computation
  score_threshold: 0.85

query:
  prompt: ""

evaluation:
  #run_mode: *run_mode
  # Evaluator type: 'retrieval_by_variant' (per-variant Recall@K + MRR) or 'llm_qa' (future)
  type: "retrieval_by_variant"

  # --- parameters for the per-variant retrieval evaluator ---
  k_values:       [1, 3, 5, 10, 18, 30, 50]  # K values for the Recall report
  retrieve_k:     100                         # how many results to return per variant (>= max(k_values))
  max_questions:  null                        # null = all questions; integer = only the first N

  # --- parameters for the llm_qa evaluator (future) ---
  llm_model:           "gpt-4o"
  top_k_context:       3     # chunks sent to the LLM for answer generation
  sleep_between_calls: 0.3
